<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Curi brand mark — cyan C arc + accent dot on midnight. Drawn
       at 512 so downscaling to 16/32/favicon sizes stays crisp. -->
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#22D3EE" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="104" fill="#05070D"/>
  <circle cx="256" cy="256" r="200" fill="url(#g)"/>
  <path
    d="M 374 162 A 136 136 0 1 0 374 350"
    stroke="#22D3EE"
    stroke-width="56"
    stroke-linecap="round"
    fill="none"
  />
  <circle cx="382" cy="256" r="18" fill="#22D3EE"/>
</svg>
